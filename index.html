<!DOCTYPE html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Inserimento Presenze</title>

  <link rel="stylesheet" href="./assets/styles.css">

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="./js/config.js"></script>
  <script src="./js/supabase-client.js"></script>
  <script src="./js/app.js" defer></script>
</head>

<body>
<div class="app-shell">

<header class="topbar">
  <div class="topbar-left">
    <div class="brand-mark">IP</div>
    <div>
      <h1 class="app-title">Inserimento Presenze</h1>
      <p class="app-subtitle">Gestione presenze giornaliere linea produttiva</p>
    </div>
  </div>

  <div class="topbar-right">
    <button id="openAttendanceBtn" class="btn btn-secondary hidden">Presenze</button>
    <button id="openOperatorsBtn" class="btn btn-secondary hidden">Operatori</button>
    <span id="userBadge" class="user-badge hidden"></span>
    <button id="logoutBtn" class="btn btn-secondary hidden">Logout</button>
  </div>
</header>

<main class="page">

<!-- LOGIN -->
<section id="authSection">
  <div class="card auth-card">
    <h2>Accesso</h2>

    <input id="emailInput" type="email" placeholder="Email">
    <input id="passwordInput" type="password" placeholder="Password">

    <button id="loginBtn" class="btn btn-primary btn-block">Accedi</button>
    <div id="authErrors" class="message hidden"></div>
  </div>
</section>

<!-- APP -->
<section id="appSection" class="hidden">

<div id="attendanceView">

<!-- STEP 1 -->
<div id="step1" class="card wizard-step">
  <h3>Linea produzione</h3>

  <select id="lineSelect">
    <option value="">Seleziona</option>
    <option>CALZOLERIA 1</option>
    <option>CALZOLERIA 2</option>
  </select>
</div>

<!-- ✅ STEP 2 MIGLIORATO -->


<div id="step2" class="wizard-step hidden" data-step="2">

  <h3>Step 2 - Parametri giornata</h3>

  <!-- BLOCCO ORARI -->
  <div class="form-grid">

    <div class="field">
      <label for="workDate">Data giornata</label>
      <input id="workDate" type="date">
    </div>

    <div class="field">
      <label for="startTime">Ora inizio lavoro</label>
      <input id="startTime" type="time">

      <div class="quick-buttons">
        <button class="quick-btn" data-target="startTime" data-value="07:30">07:30</button>
        <button class="quick-btn" data-target="startTime" data-value="08:00">08:00</button>
        <button class="quick-btn" data-target="startTime" data-value="08:30">08:30</button>
      </div>
    </div>

    <div class="field">
      <label for="endTime">Ora fine lavoro</label>
      <input id="endTime" type="time">

      <div class="quick-buttons">
        <button class="quick-btn" data-target="endTime" data-value="15:00">15:00</button>
        <button class="quick-btn" data-target="endTime" data-value="17:00">17:00</button>
        <button class="quick-btn" data-target="endTime" data-value="17:30">17:30</button>
        <button class="quick-btn" data-target="endTime" data-value="18:00">18:00</button>
      </div>
    </div>

  </div>

  <!-- STRUTTURA -->
  <div class="setup-section">

    <h4>Struttura della giornata lavorativa</h4>
    <p class="section-desc">
      Inserisci le pause e i fermi che riducono il tempo produttivo.
    </p>

    <div class="form-grid">

      <div class="field">
        <label>Pausa pranzo (minuti)</label>
        <input id="lunchMin" type="number" value="0">

        <div class="quick-buttons">
          <button class="quick-btn" data-target="lunchMin" data-value="0">0</button>
          <button class="quick-btn" data-target="lunchMin" data-value="15">15</button>
          <button class="quick-btn" data-target="lunchMin" data-value="30">30</button>
          <button class="quick-btn" data-target="lunchMin" data-value="60">60</button>
        </div>
      </div>

      <div class="field">
        <label>Pausa breve / snack (minuti)</label>
        <input id="snackMin" type="number" value="0">

        <div class="quick-buttons">
          <button class="quick-btn" data-target="snackMin" data-value="0">0</button>
          <button class="quick-btn" data-target="snackMin" data-value="10">10</button>
          <button class="quick-btn" data-target="snackMin" data-value="15">15</button>
        </div>
      </div>

      <div class="field">
        <label>Fermi produzione (minuti)</label>
        <input id="stopsMin" type="number" value="0">

        <div class="quick-buttons">
          <button class="quick-btn" data-target="stopsMin" data-value="0">0</button>
          <button class="quick-btn" data-target="stopsMin" data-value="5">5</button>
          <button class="quick-btn" data-target="stopsMin" data-value="10">10</button>
          <button class="quick-btn" data-target="stopsMin" data-value="15">15</button>
          <button class="quick-btn" data-target="stopsMin" data-value="30">30</button>
        </div>
      </div>

      <div class="field field-span-2">
        <label>Note sui fermi (opzionale)</label>
        <textarea id="stopsNote" placeholder="Esempio: guasto macchina, attesa materiali..."></textarea>
      </div>

    </div>
  </div>

  <!-- RISULTATO -->
  <div class="setup-summary-highlight">

    <div class="summary-block">
      <span class="label">Ore lavorabili</span>
      <span class="value" id="summaryWork">--</span>
    </div>

    <div class="summary-block">
      <span class="label">Tempo produttivo netto</span>
      <span class="value" id="summaryNet">--</span>
    </div>

  </div>

</div>


  

<!-- STEP 3 -->
<div id="step3" class="card wizard-step hidden">
  <div id="setupSummaryBox"></div>
  <button id="loadOperatorsBtn" class="btn btn-primary">Carica operatori</button>
</div>

<!-- NAV -->
<div class="wizard-nav">
  <button id="wizardBackBtn" class="btn btn-secondary">Indietro</button>
  <button id="wizardNextBtn" class="btn btn-primary">Avanti</button>
</div>

</div>
</section>

</main>
</div>
</body>
</html>
