<body>
  <header class="app-header">
    <div class="app-title">Inserimento Presenze</div>
    <div class="app-subtitle">Login</div>
  </header>

  <main class="container">
    <section class="card">
      <h2>Accesso utenti</h2>
      <p class="muted">Test minimale del click sul pulsante login.</p>

      <div class="grid grid-2">
        <label class="field">
          <span>Email</span>
          <input id="loginEmail" type="email" placeholder="nome@azienda.it" />
        </label>

        <label class="field">
          <span>Password</span>
          <input id="loginPassword" type="password" placeholder="Password" />
        </label>
      </div>

      <div class="toolbar">
        <button id="btnLogin" class="btn btn-primary" type="button">Accedi</button>
      </div>

      <div id="authErrors" class="errors"></div>
    </section>
  </main>

  <script type="module" src="./js/app.js?v=debug1"></script>
</body>
</html>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Test Login</title>
  <meta name="theme-color" content="#111827" />
  <style>
    :root{
      --bg:#f5f6f8;
      --card:#ffffff;
      --text:#111827;
      --muted:#6b7280;
      --primary:#4368e0;
      --primary-hover:#3557c7;
      --border:#e5e7eb;
      --header:#111827;
    }

    *{
      box-sizing:border-box;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,Arial,sans-serif;
    }

    body{
      margin:0;
      background:var(--bg);
      color:var(--text);
    }

    .app-header{
      padding:14px 16px;
      background:var(--header);
      color:#fff;
    }

    .app-title{
      font-size:20px;
      font-weight:800;
    }

    .app-subtitle{
      font-size:12px;
      color:#cbd5e1;
      margin-top:2px;
    }

    .container{
      max-width:1000px;
      margin:0 auto;
      padding:24px;
    }

    .card{
      background:var(--card);
      border:1px solid var(--border);
      border-radius:18px;
      padding:24px;
      margin-top:24px;
      box-shadow:0 10px 25px rgba(0,0,0,.05);
    }

    h2{
      margin:0 0 12px 0;
      font-size:22px;
      font-weight:800;
    }

    .muted{
      font-size:13px;
      color:var(--muted);
    }

    .grid{
      display:grid;
      gap:14px;
    }

    .grid-2{
      grid-template-columns:repeat(2,minmax(0,1fr));
    }

    .field{
      display:flex;
      flex-direction:column;
      gap:8px;
      margin-top:14px;
    }

    .field span{
      font-size:14px;
      font-weight:700;
    }

    input{
      width:100%;
      padding:14px 16px;
      border:1px solid var(--border);
      border-radius:14px;
      background:#fff;
      font-size:16px;
      outline:none;
    }

    .toolbar{
      margin-top:18px;
    }

    .btn{
      border:none;
      border-radius:16px;
      padding:16px 18px;
      cursor:pointer;
      font-weight:800;
      font-size:16px;
      min-height:58px;
    }

    .btn-primary{
      background:var(--primary);
      color:#fff;
    }

    .btn-primary:hover{
      background:var(--primary-hover);
    }

    .errors{
      margin-top:14px;
      border:1px solid rgba(220,38,38,.25);
      background:rgba(220,38,38,.06);
      color:#7f1d1d;
      border-radius:12px;
      padding:12px 14px;
      font-size:13px;
      display:none;
    }

    .errors.show{
      display:block;
    }
